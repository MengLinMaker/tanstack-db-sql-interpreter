name: ci

on:
  pull_request:
    branches:
      - '**'

jobs:
  test:
    name: Test - lint, type and unit
    runs-on: ubuntu-24.04-arm
    # Cache even on failure
    continue-on-error: true
    steps:
      - name: Deep checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm i --no-frozen-lockfile --prefer-offline

      - name: Build affected packages
        shell: bash
        run: pnpm --filter '...[origin/main]' build

      - name: Test lint, type and unit
        run: pnpm --filter '...[origin/main]' '/test:(type|lint|unit)/'

    name: Test SST - infrastructure deployment
    runs-on: blacksmith-4vcpu-ubuntu-2404-arm
    # Cache even on failure
    continue-on-error: true
    steps:
      - name: Deep checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup ci
        uses: ./.github/actions/setup-ci

      - name: Build all packages
        shell: bash
        run: pnpm -r build

      - name: Cache .sst folder
        uses: actions/cache@v4
        with:
          path: ./.sst
          key: sst-cache-${{ github.job }}-${{ github.run_id }}
          restore-keys: |
            sst-cache-${{ github.job }}-
            sst-cache-

      - name: Deploy SST infrastructure
        run: pnpm sst deploy --print-logs --continue --stage ${{ github.head_ref }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          DB_SERVICE_SCRAPE: ${{ secrets.DB_SERVICE_SCRAPE }}
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_API_URL: https://www.${{ github.event.ref }}.dev.newhomie.com

      # TODO: add integration test scripts
      - name: Test
        run: echo 'TODO'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}